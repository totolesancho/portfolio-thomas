<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Thomas Etcheverry</title>
  <meta name="robots" content="noindex" />
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>
  <script>
    /* Aliases courts (Decap CMS expose h + createClass globalement) */
    const h = CMS.h;
    const createClass = CMS.createClass;

    /* Charger la stylesheet de la preview pane */
    CMS.registerPreviewStyle('/admin/preview.css');

    /* Helper : rend une image dans la preview */
    const img = (src) => src ? `<img src="${src}" alt="" />` : '';
    /* Helper : escape HTML */
    const esc = (s) => (s || '').toString()
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    /* ============================================================
       Preview templates : rend chaque collection joliment à droite
       ============================================================ */

    /* --- Site (page d'accueil) --- */
    CMS.registerPreviewTemplate('site', createClass({
      render: function() {
        const d = this.props.entry.getIn(['data']).toJS();
        return h('div', {}, [
          h('h1', {key:'t'}, '🏠 Page d\'accueil'),
          h('hr', {key:'hr1'}),
          h('h3', {key:'h-hero'}, 'Hero'),
          d.hero && h('div', {key:'hero', dangerouslySetInnerHTML: {__html:
            (d.hero.photo ? img(d.hero.photo) : '') +
            `<p><strong>Badge :</strong> ${esc(d.hero.status_text)}</p>` +
            `<p><strong>Titre L1 :</strong> ${esc(d.hero.title_line1)}</p>` +
            `<p><strong>Titre L2 :</strong> ${esc(d.hero.title_line2)}</p>` +
            `<p><strong>Graffiti :</strong> ${esc(d.hero.graffiti_tag)}</p>` +
            `<p><strong>Tagline :</strong> ${esc(d.hero.tagline)}</p>` +
            `<p><strong>CTA :</strong> ${esc(d.hero.cta_label)} → ${esc(d.hero.cta_href)}</p>`
          }}),
          h('hr', {key:'hr2'}),
          h('h3', {key:'h-about'}, 'À propos'),
          d.about && h('div', {key:'about', dangerouslySetInnerHTML: {__html:
            `<h2>${esc(d.about.title_main)} <em style="color:#ff3b1c">${esc(d.about.title_script)}</em></h2>` +
            `<p>${esc(d.about.body)}</p>` +
            `<p><strong>Stack :</strong> ${esc(d.about.stack)}</p>`
          }}),
          h('hr', {key:'hr3'}),
          h('h3', {key:'h-cv'}, 'CV Vidéo'),
          d.cv_video && h('div', {key:'cv', dangerouslySetInnerHTML: {__html:
            (d.cv_video.circle_photo ? `<div style="display:inline-block;width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid #0e0e0e;margin-right:12px;vertical-align:middle">${img(d.cv_video.circle_photo)}</div>` : '') +
            `<p>${esc(d.cv_video.kicker)}</p>` +
            `<h2 style="font-family:'Caveat',cursive;font-size:32px">${esc(d.cv_video.quote_main)}</h2>` +
            `<p><em>${esc(d.cv_video.quote_sub)}</em></p>` +
            `<p><strong>YouTube ID :</strong> ${esc(d.cv_video.youtube_id) || '<em style="color:#bbb">(non renseigné)</em>'}</p>`
          }}),
          h('hr', {key:'hr4'}),
          h('h3', {key:'h-show'}, 'Showreel'),
          d.showreel && h('div', {key:'show', dangerouslySetInnerHTML: {__html:
            (d.showreel.poster ? img(d.showreel.poster) : '') +
            `<p><strong>Kicker :</strong> ${esc(d.showreel.kicker)}</p>` +
            `<p><strong>Durée :</strong> ${esc(d.showreel.duration)}</p>`
          }}),
          h('hr', {key:'hr5'}),
          h('h3', {key:'h-marq'}, 'Marquees'),
          d.marquee_formats && h('div', {key:'mf', dangerouslySetInnerHTML: {__html:
            `<p><strong>Formats :</strong></p><ul>${d.marquee_formats.map(f => `<li>${esc(f)}</li>`).join('')}</ul>`
          }}),
          d.marquee_clients && h('div', {key:'mc', dangerouslySetInnerHTML: {__html:
            `<p><strong>Marques :</strong></p><ul>${d.marquee_clients.map(c => `<li>${esc(c)}</li>`).join('')}</ul>`
          }}),
          h('hr', {key:'hr6'}),
          h('h3', {key:'h-ct'}, 'Contact'),
          d.contact && h('div', {key:'ct', dangerouslySetInnerHTML: {__html:
            `<h2>${esc(d.contact.title)}</h2>` +
            `<p>${esc(d.contact.intro)}</p>` +
            `<p><em style="color:#ff3b1c">${esc(d.contact.intro_accent)}</em></p>` +
            `<p><strong>Formspree ID :</strong> ${esc(d.contact.formspree_id) || '<em style="color:#bbb">(non renseigné — form en mailto pour l\'instant)</em>'}</p>`
          }}),
        ]);
      }
    }));

    /* --- Projects --- */
    /* Normalise videos / images (peut être string OR {id|img}) */
    const normVideos = (arr) => (arr || []).map(v => typeof v === 'string' ? v : (v && v.id)).filter(Boolean);
    const normImages = (arr) => (arr || []).map(im => typeof im === 'string' ? im : (im && im.img)).filter(Boolean);

    /* Card preview ~ catalogue 4:3 — montre exactement ce qui sera rendu */
    const renderCard = (p) => {
      const focal = esc(p.thumb_focal || 'center');
      const sub = esc(p.card_subtitle || ((p.client || '') + ' · ' + (p.year || '')));
      const cat = esc(p.category || 'PUB');
      return `<div style="position:relative;width:280px;aspect-ratio:4/3;background:#1a1817;border-radius:6px;overflow:hidden;margin:8px 0;box-shadow:0 4px 16px rgba(0,0,0,.15)">
        ${p.thumb ? `<div style="position:absolute;inset:0;background-image:url('${esc(p.thumb)}');background-size:cover;background-position:${focal}"></div>` : `<div style="position:absolute;inset:0;display:grid;place-items:center;color:#666;font-size:11px;font-family:Inter,sans-serif">— pas de vignette —</div>`}
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(14,14,14,.8) 0%,rgba(14,14,14,.2) 35%,transparent 55%)"></div>
        <div style="position:absolute;bottom:14px;left:14px;right:14px;color:#f4f1ea">
          <span style="display:inline-block;background:#ff3b1c;color:#f4f1ea;padding:3px 7px;font-family:Inter,sans-serif;font-weight:600;font-size:9px;letter-spacing:.18em;border-radius:2px;margin-bottom:8px">${cat}</span>
          <div style="font-family:Inter,sans-serif;font-weight:500;font-size:9px;letter-spacing:.14em;text-transform:uppercase;opacity:.85">${sub}</div>
        </div>
      </div>`;
    };

    CMS.registerPreviewTemplate('projects', createClass({
      render: function() {
        const d = this.props.entry.getIn(['data']).toJS();
        const list = d.projects || [];
        const featured = list.filter(p => p.featured);
        return h('div', {}, [
          h('h1', {key:'t'}, `🎬 ${list.length} projets`),
          h('p', {key:'sub'}, `${featured.length} featured sur l'accueil`),
          h('hr', {key:'hr0'}),
          ...list.map((p, i) => {
            const videos = normVideos(p.videos);
            const images = normImages(p.images);
            return h('div', {key:`p${i}`, style:{margin:'24px 0',padding:'16px',background:'#fafafa',borderRadius:'8px',border:'1px solid #eee'}, dangerouslySetInnerHTML: {__html:
              `<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
                <div style="flex:0 0 280px">${renderCard(p)}</div>
                <div style="flex:1;min-width:260px">
                  <h2 style="margin:0 0 4px 0">#${esc(p.num)} — ${esc(p.title)} ${p.featured ? '⭐' : ''}</h2>
                  <p style="margin:0 0 12px 0;color:#666;font-size:13px">slug : <code>${esc(p.slug)}</code> → <code>/projets/${esc(p.slug)}.html</code></p>
                  <p style="margin:4px 0;font-size:13px"><strong>Catégorie :</strong> ${esc(p.category)} · <strong>Année :</strong> ${esc(p.year)}</p>
                  <p style="margin:4px 0;font-size:13px"><strong>Client :</strong> ${esc(p.client)}</p>
                  <p style="margin:4px 0;font-size:13px"><strong>Format :</strong> ${esc(p.format)} · <strong>Rôle :</strong> ${esc(p.role)}</p>
                  <p style="margin:4px 0;font-size:13px"><strong>Focal point :</strong> ${esc(p.thumb_focal || 'center')}</p>
                  ${p.featured ? `<p style="margin:4px 0;font-size:13px;color:#ff3b1c"><strong>⭐ Accueil :</strong> position ${esc(p.featured_order)}</p>` : ''}
                  <p style="margin:8px 0 4px 0;font-size:13px"><strong>🎥 Vidéos :</strong> ${videos.length} (${videos.join(', ') || 'aucune'})</p>
                  ${images.length ? `<p style="margin:4px 0;font-size:13px"><strong>📷 Galerie :</strong> ${images.length} photos</p>` : ''}
                  ${(p.impact_metric1 && p.impact_metric1 !== '—') ? `<p style="margin:4px 0;font-size:13px"><strong>📊 Impact :</strong> ${esc(p.impact_metric1)} ${esc(p.impact_label1)}</p>` : ''}
                </div>
              </div>
              ${p.brief ? `<details style="margin-top:12px"><summary style="cursor:pointer;font-size:13px;color:#666"><strong>📝 Brief & approche</strong></summary><p style="margin-top:8px;font-size:13px;line-height:1.5"><strong>Brief :</strong> ${esc(p.brief)}</p><p style="font-size:13px;line-height:1.5"><strong>Approche §1 :</strong> ${esc(p.approche_1).slice(0,300)}…</p></details>` : ''}
              ${images.length ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px;margin-top:8px">${images.slice(0,6).map(src => `<div style="aspect-ratio:1;background-image:url('${esc(src)}');background-size:cover;border-radius:3px"></div>`).join('')}</div>` : ''}`
            }});
          }),
        ]);
      }
    }));

    /* --- Testimonials --- */
    CMS.registerPreviewTemplate('testimonials', createClass({
      render: function() {
        const d = this.props.entry.getIn(['data']).toJS();
        const list = d.testimonials || [];
        return h('div', {}, [
          h('h1', {key:'t'}, `💬 ${list.length} témoignages`),
          h('hr', {key:'hr0'}),
          ...list.map((t, i) => h('div', {key:`t${i}`, dangerouslySetInnerHTML: {__html:
            `<h2>${esc(t.emoji)} ${esc(t.client)}</h2>` +
            `<p><em>"${esc(t.quote)}"</em></p>` +
            `<p><strong>Rôle :</strong> ${esc(t.role)}</p>` +
            `<p><strong>Style :</strong> ${esc(t.style)}</p>` +
            `<hr/>`
          }})),
        ]);
      }
    }));

  </script>
</body>
</html>
