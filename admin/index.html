<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Thomas Etcheverry</title>
  <meta name="robots" content="noindex" />
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
  <style>
    /* ============================================================
       Polish visuel du form Decap — séparateurs entre sections ①→⑧
       ============================================================ */
    [class*="ControlPane"] [class*="root"] > div:has(label[for$="-slug"]),
    [class*="ControlPane"] [class*="root"] > div:has(label[for$="-thumb"]),
    [class*="ControlPane"] [class*="root"] > div:has(label[for$="-featured"]),
    [class*="ControlPane"] [class*="root"] > div:has(label[for$="-videos"]),
    [class*="ControlPane"] [class*="root"] > div:has(label[for$="-brief"]),
    [class*="ControlPane"] [class*="root"] > div:has(label[for$="-stack_camera"]),
    [class*="ControlPane"] [class*="root"] > div:has(label[for$="-impact_metric1"]) {
      border-top: 2px solid #f0eee8;
      margin-top: 24px !important;
      padding-top: 24px !important;
    }

    /* (CSS scroll indépendant retiré — cassait l'app entière.
        Decap a déjà son propre layout 2-panes, on laisse faire.) */
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>
  <script>
    /* ============================================================
       Decap CMS v3 expose h + createClass + PropTypes en globals window.*
       (pas sur CMS.*). Fallback sur CMS.* si jamais.
       ============================================================ */
    const h = window.h || (window.CMS && window.CMS.h);
    const createClass = window.createClass || (window.CMS && window.CMS.createClass);
    if (!h || !createClass) {
      console.error('[admin] Decap helpers h/createClass introuvables — custom widgets désactivés');
    }

    /* Charger la stylesheet de la preview pane */
    CMS.registerPreviewStyle('/admin/preview.css');

    /* ============================================================
       Custom widget : FOCAL POINT picker visuel + ZOOM
       - Affiche l'image source (lue depuis champ frère défini par
         field.image_field, défaut "thumb")
       - Click sur l'image → pose le focal point (X% Y%)
       - Slider zoom (50-200%) → redimensionne l'image dans le cadre
       - Sauvé comme "X% Y% / Z%" (ou juste "X% Y%" si zoom = 100)
       - Compatible CSS : background-position + background-size
       - Preview live à droite : carte 4:3 avec crop appliqué
       ============================================================ */

    /* Helpers partagés (utilisés aussi par le render côté site) */
    function parseFocalString(val) {
      // Retourne { x, y, zoom } depuis "X% Y%" / "X% Y% / Z%" / "center" / etc.
      const out = { x: 50, y: 50, zoom: 100 };
      if (!val) return out;
      const v = String(val).trim().toLowerCase();
      const keywords = {
        'center':       { x: 50, y: 50 },
        'top':          { x: 50, y: 0 },
        'bottom':       { x: 50, y: 100 },
        'left':         { x: 0,  y: 50 },
        'right':        { x: 100, y: 50 },
        'left top':     { x: 0,  y: 0 },
        'top left':     { x: 0,  y: 0 },
        'right top':    { x: 100, y: 0 },
        'top right':    { x: 100, y: 0 },
        'left bottom':  { x: 0,  y: 100 },
        'bottom left':  { x: 0,  y: 100 },
        'right bottom': { x: 100, y: 100 },
        'bottom right': { x: 100, y: 100 },
      };
      // "X% Y% / Z%" ou "X% Y%"
      const slashIdx = v.indexOf('/');
      const posStr  = slashIdx >= 0 ? v.slice(0, slashIdx).trim() : v;
      const zoomStr = slashIdx >= 0 ? v.slice(slashIdx + 1).trim() : '';
      if (keywords[posStr]) { Object.assign(out, keywords[posStr]); }
      else {
        const m = posStr.match(/^([\d.]+)%\s+([\d.]+)%$/);
        if (m) { out.x = parseFloat(m[1]); out.y = parseFloat(m[2]); }
      }
      if (zoomStr) {
        const z = parseFloat(zoomStr);
        if (!isNaN(z) && z > 0) out.zoom = z;
      }
      return out;
    }

    function buildFocalString(x, y, zoom) {
      const xr = Math.round(x);
      const yr = Math.round(y);
      const zr = Math.round(zoom);
      if (zr === 100) return `${xr}% ${yr}%`;
      return `${xr}% ${yr}% / ${zr}%`;
    }

    /* CSS style depuis valeur focal — utilisé dans la preview du widget */
    function focalToStyle(val) {
      const { x, y, zoom } = parseFocalString(val);
      return {
        backgroundPosition: `${x}% ${y}%`,
        backgroundSize: zoom === 100 ? 'cover' : (zoom + '%'),
      };
    }

    const FocalPointControl = createClass({
      getDefaultProps() { return { value: 'center' }; },

      /* Trouve l'URL de l'image source à partir du forID + entry */
      getImageUrl() {
        try {
          const entry = this.props.entry;
          if (!entry) return null;
          const data = entry.get('data').toJS();
          const forID = this.props.forID || '';
          const field = this.props.field;
          // Le nom du champ image frère (configurable : field.image_field, défaut "thumb")
          const imgFieldName = (field && field.get && field.get('image_field')) || 'thumb';

          // Extrait tous les indices numériques du forID (ex: "projects-2-thumb_focal" ou "projects-2-images-0-focal")
          const indices = (forID.match(/-(\d+)(?=-)/g) || []).map(s => parseInt(s.replace(/-/g, ''), 10));

          // Navigation : data.projects[i0].images[i1]... jusqu'à trouver le champ image
          let node = data;
          const listKeys = ['projects', 'images', 'photos', 'medias', 'gallery'];
          let depthIdx = 0;
          while (node && typeof node === 'object') {
            // Si node est un array → prend l'index suivant
            if (Array.isArray(node)) {
              const idx = indices[depthIdx++];
              if (idx == null || !node[idx]) break;
              node = node[idx];
            } else {
              // Sinon descends dans la 1ère key liste-like trouvée
              const listKey = listKeys.find(k => Array.isArray(node[k]));
              if (!listKey) break;
              node = node[listKey];
            }
          }

          // node = l'item du projet OU de la galerie
          if (node && typeof node === 'object') {
            const v = node[imgFieldName];
            if (v && typeof v === 'string') return v;
          }

          // Fallback : recursive search
          const findField = (obj) => {
            if (!obj || typeof obj !== 'object') return null;
            if (obj[imgFieldName] && typeof obj[imgFieldName] === 'string') return obj[imgFieldName];
            if (Array.isArray(obj)) for (const it of obj) { const r = findField(it); if (r) return r; }
            else for (const k of Object.keys(obj)) { const r = findField(obj[k]); if (r) return r; }
            return null;
          };
          return findField(data);
        } catch (e) {
          console.warn('[focal_point] getImageUrl error', e);
          return null;
        }
      },

      handleClick(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
        const y = Math.round(((e.clientY - rect.top)  / rect.height) * 100);
        const { zoom } = parseFocalString(this.props.value);
        this.props.onChange(buildFocalString(x, y, zoom));
      },

      handlePresetClick(val) {
        const { zoom } = parseFocalString(this.props.value);
        // Convertit le preset keyword en X% Y%
        const { x, y } = parseFocalString(val);
        this.props.onChange(buildFocalString(x, y, zoom));
      },

      handleZoomChange(e) {
        const zoom = parseFloat(e.target.value);
        const { x, y } = parseFocalString(this.props.value);
        this.props.onChange(buildFocalString(x, y, zoom));
      },

      render() {
        const value = this.props.value || 'center';
        const { x, y, zoom } = parseFocalString(value);
        const image = this.getImageUrl();
        const field = this.props.field;
        const previewAspect = (field && field.get && field.get('preview_aspect')) || '4/3';

        const presets = [
          { v: 'center', l: 'Centre' },
          { v: 'top',    l: 'Haut' },
          { v: 'bottom', l: 'Bas' },
          { v: 'left',   l: 'Gauche' },
          { v: 'right',  l: 'Droite' },
        ];

        if (!image) {
          return h('div', {style:{padding:'12px',background:'#fff8e1',border:'1px solid #f0d97a',borderRadius:'4px',fontSize:'13px',color:'#7c5e00'}},
            '⚠️ Upload une image dans le champ "image" juste au-dessus pour activer le picker.'
          );
        }

        return h('div', {style:{background:'#fff',border:'2px solid #dfdfe3',borderRadius:'4px',padding:'12px'}}, [
          h('div', {key:'top',style:{display:'flex',gap:'16px',alignItems:'flex-start',flexWrap:'wrap'}}, [

            // ==== Picker (image cliquable) ====
            h('div', {key:'picker',style:{flex:'1 1 320px',minWidth:'280px'}}, [
              h('div', {key:'lbl',style:{fontSize:'12px',color:'#666',marginBottom:'6px',fontWeight:600}}, '👆 Clique sur le sujet à GARDER visible'),
              h('div', {
                key:'imgw',
                onClick: this.handleClick,
                style:{
                  position:'relative',width:'100%',maxWidth:'420px',
                  cursor:'crosshair',border:'2px solid #0e0e0e',
                  borderRadius:'4px',overflow:'hidden',userSelect:'none',
                }
              }, [
                h('img', {key:'img',src:image,style:{display:'block',width:'100%',height:'auto',pointerEvents:'none'},alt:''}),
                h('div', {key:'cross',style:{
                  position:'absolute',
                  left:x+'%',top:y+'%',
                  width:'24px',height:'24px',
                  marginLeft:'-12px',marginTop:'-12px',
                  borderRadius:'50%',
                  background:'#ff3b1c',
                  border:'3px solid #fff',
                  boxShadow:'0 0 0 2px #ff3b1c, 0 2px 8px rgba(0,0,0,.4)',
                  pointerEvents:'none',transition:'all .15s',
                }}),
              ]),
            ]),

            // ==== Preview 4:3 (ou aspect configurable) ====
            h('div', {key:'preview',style:{flex:'0 0 220px'}}, [
              h('div', {key:'lbl',style:{fontSize:'12px',color:'#666',marginBottom:'6px',fontWeight:600}}, `📺 Aperçu ${previewAspect}`),
              h('div', {key:'card',style:{
                position:'relative',width:'220px',aspectRatio:previewAspect,
                background:'#1a1817',borderRadius:'6px',overflow:'hidden',
                boxShadow:'0 4px 16px rgba(0,0,0,.15)',
              }}, [
                h('div', {key:'thumb',style:{
                  position:'absolute',inset:0,
                  backgroundImage:`url('${image}')`,
                  backgroundRepeat:'no-repeat',
                  backgroundColor:'#000',
                  backgroundSize: zoom === 100 ? 'cover' : (zoom + '%'),
                  backgroundPosition:`${x}% ${y}%`,
                  transition:'all .2s',
                }}),
              ]),
              h('div', {key:'val',style:{
                marginTop:'8px',fontSize:'11px',fontFamily:'monospace',
                color:'#666',wordBreak:'break-all',
              }}, `valeur : ${value}`),
            ]),
          ]),

          // ==== ZOOM SLIDER ====
          h('div', {key:'zoom',style:{marginTop:'14px',paddingTop:'12px',borderTop:'1px solid #eee'}}, [
            h('div', {key:'lbl',style:{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#666',marginBottom:'4px',fontWeight:600}}, [
              h('span', {key:'l'}, `🔍 Zoom : ${Math.round(zoom)}%`),
              h('span', {key:'r',style:{fontSize:'11px',color:'#aaa',fontWeight:400}}, zoom === 100 ? '(défaut — remplit le cadre)' : (zoom < 100 ? '(dézoomé — montre + d\'image)' : '(zoomé — montre - d\'image)')),
            ]),
            h('input', {
              key:'in',type:'range',min:50,max:200,step:5,value:zoom,
              onChange:this.handleZoomChange,
              style:{width:'100%',accentColor:'#ff3b1c'}
            }),
            h('div', {key:'tags',style:{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#bbb',marginTop:'2px'}}, [
              h('span', {key:'a'}, '50% (dézoom max)'),
              h('span', {key:'b'}, '100% (cover)'),
              h('span', {key:'c'}, '200% (zoom max)'),
            ]),
          ]),

          // ==== Presets rapides ====
          h('div', {key:'presets',style:{marginTop:'12px',paddingTop:'12px',borderTop:'1px solid #eee'}}, [
            h('div', {key:'lbl',style:{fontSize:'11px',color:'#999',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.05em'}}, 'Presets focal point'),
            h('div', {key:'btns',style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
              presets.map(p => h('button', {
                key:p.v,type:'button',
                onClick: () => this.handlePresetClick(p.v),
                style:{
                  padding:'6px 12px',
                  background: '#fff', color:'#333',
                  border:'1px solid #ccc',
                  borderRadius:'3px',cursor:'pointer',
                  fontSize:'12px',fontFamily:'inherit',
                }
              }, p.l))
            ),
          ]),
        ]);
      }
    });

    /* Preview du widget dans la preview pane à droite (juste affiche la valeur) */
    const FocalPointPreview = createClass({
      render() {
        return h('span', {style:{fontFamily:'monospace',fontSize:'12px',color:'#666'}}, this.props.value || 'center');
      }
    });

    try {
      CMS.registerWidget('focal_point', FocalPointControl, FocalPointPreview);
      console.log('[admin] Custom widget focal_point enregistré ✓');
    } catch (e) {
      console.error('[admin] Erreur enregistrement widget focal_point:', e);
    }

    /* Helper : rend une image dans la preview */
    const img = (src) => src ? `<img src="${src}" alt="" />` : '';
    /* Helper : escape HTML */
    const esc = (s) => (s || '').toString()
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    /* ============================================================
       Preview templates : rend chaque collection joliment à droite
       ============================================================ */

    /* --- Site (page d'accueil) --- */
    CMS.registerPreviewTemplate('site', createClass({
      render: function() {
        const d = this.props.entry.getIn(['data']).toJS();
        return h('div', {}, [
          h('h1', {key:'t'}, '🏠 Page d\'accueil'),
          h('hr', {key:'hr1'}),
          h('h3', {key:'h-hero'}, 'Hero'),
          d.hero && h('div', {key:'hero', dangerouslySetInnerHTML: {__html:
            (d.hero.photo ? img(d.hero.photo) : '') +
            `<p><strong>Badge :</strong> ${esc(d.hero.status_text)}</p>` +
            `<p><strong>Titre L1 :</strong> ${esc(d.hero.title_line1)}</p>` +
            `<p><strong>Titre L2 :</strong> ${esc(d.hero.title_line2)}</p>` +
            `<p><strong>Graffiti :</strong> ${esc(d.hero.graffiti_tag)}</p>` +
            `<p><strong>Tagline :</strong> ${esc(d.hero.tagline)}</p>` +
            `<p><strong>CTA :</strong> ${esc(d.hero.cta_label)} → ${esc(d.hero.cta_href)}</p>`
          }}),
          h('hr', {key:'hr2'}),
          h('h3', {key:'h-about'}, 'À propos'),
          d.about && h('div', {key:'about', dangerouslySetInnerHTML: {__html:
            `<h2>${esc(d.about.title_main)} <em style="color:#ff3b1c">${esc(d.about.title_script)}</em></h2>` +
            `<p>${esc(d.about.body)}</p>` +
            `<p><strong>Stack :</strong> ${esc(d.about.stack)}</p>`
          }}),
          h('hr', {key:'hr3'}),
          h('h3', {key:'h-cv'}, 'CV Vidéo'),
          d.cv_video && h('div', {key:'cv', dangerouslySetInnerHTML: {__html:
            (d.cv_video.circle_photo ? `<div style="display:inline-block;width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid #0e0e0e;margin-right:12px;vertical-align:middle">${img(d.cv_video.circle_photo)}</div>` : '') +
            `<p>${esc(d.cv_video.kicker)}</p>` +
            `<h2 style="font-family:'Caveat',cursive;font-size:32px">${esc(d.cv_video.quote_main)}</h2>` +
            `<p><em>${esc(d.cv_video.quote_sub)}</em></p>` +
            `<p><strong>YouTube ID :</strong> ${esc(d.cv_video.youtube_id) || '<em style="color:#bbb">(non renseigné)</em>'}</p>`
          }}),
          h('hr', {key:'hr4'}),
          h('h3', {key:'h-show'}, 'Showreel'),
          d.showreel && h('div', {key:'show', dangerouslySetInnerHTML: {__html:
            (d.showreel.poster ? img(d.showreel.poster) : '') +
            `<p><strong>Kicker :</strong> ${esc(d.showreel.kicker)}</p>` +
            `<p><strong>Durée :</strong> ${esc(d.showreel.duration)}</p>`
          }}),
          h('hr', {key:'hr5'}),
          h('h3', {key:'h-marq'}, 'Marquees'),
          d.marquee_formats && h('div', {key:'mf', dangerouslySetInnerHTML: {__html:
            `<p><strong>Formats :</strong></p><ul>${d.marquee_formats.map(f => `<li>${esc(f)}</li>`).join('')}</ul>`
          }}),
          d.marquee_clients && h('div', {key:'mc', dangerouslySetInnerHTML: {__html:
            `<p><strong>Marques :</strong></p><ul>${d.marquee_clients.map(c => `<li>${esc(c)}</li>`).join('')}</ul>`
          }}),
          h('hr', {key:'hr6'}),
          h('h3', {key:'h-ct'}, 'Contact'),
          d.contact && h('div', {key:'ct', dangerouslySetInnerHTML: {__html:
            `<h2>${esc(d.contact.title)}</h2>` +
            `<p>${esc(d.contact.intro)}</p>` +
            `<p><em style="color:#ff3b1c">${esc(d.contact.intro_accent)}</em></p>` +
            `<p><strong>Formspree ID :</strong> ${esc(d.contact.formspree_id) || '<em style="color:#bbb">(non renseigné — form en mailto pour l\'instant)</em>'}</p>`
          }}),
        ]);
      }
    }));

    /* --- Projects --- */
    /* Normalise videos / images (peut être string OR {id|img}) */
    const normVideos = (arr) => (arr || []).map(v => typeof v === 'string' ? v : (v && v.id)).filter(Boolean);
    const normImages = (arr) => (arr || []).map(im => typeof im === 'string' ? im : (im && im.img)).filter(Boolean);

    /* Card preview ~ catalogue 4:3 — utilise focalToStyle pour parser zoom correctement */
    const renderCard = (p) => {
      const sub = esc(p.card_subtitle || ((p.client || '') + ' · ' + (p.year || '')));
      const cat = esc(p.category || 'PUB');
      const st = focalToStyle(p.thumb_focal || 'center');
      const thumbStyle = `position:absolute;inset:0;background-image:url('${esc(p.thumb)}');background-position:${st.backgroundPosition};background-size:${st.backgroundSize};background-repeat:no-repeat;background-color:#000`;
      return `<div style="position:relative;width:280px;aspect-ratio:4/3;background:#1a1817;border-radius:6px;overflow:hidden;margin:8px 0;box-shadow:0 4px 16px rgba(0,0,0,.15)">
        ${p.thumb ? `<div style="${thumbStyle}"></div>` : `<div style="position:absolute;inset:0;display:grid;place-items:center;color:#666;font-size:11px;font-family:Inter,sans-serif">— pas de vignette —</div>`}
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(14,14,14,.8) 0%,rgba(14,14,14,.2) 35%,transparent 55%)"></div>
        <div style="position:absolute;bottom:14px;left:14px;right:14px;color:#f4f1ea">
          <span style="display:inline-block;background:#ff3b1c;color:#f4f1ea;padding:3px 7px;font-family:Inter,sans-serif;font-weight:600;font-size:9px;letter-spacing:.18em;border-radius:2px;margin-bottom:8px">${cat}</span>
          <div style="font-family:Inter,sans-serif;font-weight:500;font-size:9px;letter-spacing:.14em;text-transform:uppercase;opacity:.85">${sub}</div>
        </div>
      </div>`;
    };

    CMS.registerPreviewTemplate('projects', createClass({
      render: function() {
        const d = this.props.entry.getIn(['data']).toJS();
        const list = d.projects || [];
        const featured = list.filter(p => p.featured);
        return h('div', {}, [
          h('h1', {key:'t'}, `🎬 ${list.length} projets`),
          h('p', {key:'sub'}, `${featured.length} featured sur l'accueil`),
          h('hr', {key:'hr0'}),
          ...list.map((p, i) => {
            const videos = normVideos(p.videos);
            const images = normImages(p.images);
            return h('div', {key:`p${i}`, style:{margin:'24px 0',padding:'16px',background:'#fafafa',borderRadius:'8px',border:'1px solid #eee'}, dangerouslySetInnerHTML: {__html:
              `<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
                <div style="flex:0 0 280px">${renderCard(p)}</div>
                <div style="flex:1;min-width:260px">
                  <h2 style="margin:0 0 4px 0">#${esc(p.num)} — ${esc(p.title)} ${p.featured ? '⭐' : ''}</h2>
                  <p style="margin:0 0 12px 0;color:#666;font-size:13px">slug : <code>${esc(p.slug)}</code> → <code>/projets/${esc(p.slug)}</code></p>
                  <p style="margin:4px 0;font-size:13px"><strong>Catégorie :</strong> ${esc(p.category)} · <strong>Année :</strong> ${esc(p.year)}</p>
                  <p style="margin:4px 0;font-size:13px"><strong>Client :</strong> ${esc(p.client)}</p>
                  <p style="margin:4px 0;font-size:13px"><strong>Format :</strong> ${esc(p.format)} · <strong>Rôle :</strong> ${esc(p.role)}</p>
                  <p style="margin:4px 0;font-size:13px"><strong>Focal point :</strong> ${esc(p.thumb_focal || 'center')}</p>
                  ${p.featured ? `<p style="margin:4px 0;font-size:13px;color:#ff3b1c"><strong>⭐ Accueil :</strong> position ${esc(p.featured_order)}</p>` : ''}
                  <p style="margin:8px 0 4px 0;font-size:13px"><strong>🎥 Vidéos :</strong> ${videos.length} (${videos.join(', ') || 'aucune'})</p>
                  ${images.length ? `<p style="margin:4px 0;font-size:13px"><strong>📷 Galerie :</strong> ${images.length} photos</p>` : ''}
                  ${(p.impact_metric1 && p.impact_metric1 !== '—') ? `<p style="margin:4px 0;font-size:13px"><strong>📊 Impact :</strong> ${esc(p.impact_metric1)} ${esc(p.impact_label1)}</p>` : ''}
                </div>
              </div>
              ${p.brief ? `<details style="margin-top:12px"><summary style="cursor:pointer;font-size:13px;color:#666"><strong>📝 Brief & approche</strong></summary><p style="margin-top:8px;font-size:13px;line-height:1.5"><strong>Brief :</strong> ${esc(p.brief)}</p><p style="font-size:13px;line-height:1.5"><strong>Approche §1 :</strong> ${esc(p.approche_1).slice(0,300)}…</p></details>` : ''}
              ${images.length ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px;margin-top:8px">${images.slice(0,6).map(src => `<div style="aspect-ratio:1;background-image:url('${esc(src)}');background-size:cover;border-radius:3px"></div>`).join('')}</div>` : ''}`
            }});
          }),
        ]);
      }
    }));

    /* --- Testimonials --- */
    CMS.registerPreviewTemplate('testimonials', createClass({
      render: function() {
        const d = this.props.entry.getIn(['data']).toJS();
        const list = d.testimonials || [];
        return h('div', {}, [
          h('h1', {key:'t'}, `💬 ${list.length} témoignages`),
          h('hr', {key:'hr0'}),
          ...list.map((t, i) => {
            // Avatar : photo (avec focal point) ou emoji fallback
            const st = focalToStyle(t.photo_focal || 'center');
            const avatar = t.photo
              ? `<div style="width:48px;height:48px;border-radius:50%;background-image:url('${esc(t.photo)}');background-position:${st.backgroundPosition};background-size:${st.backgroundSize};background-repeat:no-repeat;border:2px solid #0e0e0e;display:inline-block;vertical-align:middle;margin-right:10px"></div>`
              : `<span style="display:inline-block;width:48px;height:48px;border-radius:50%;background:#f0eee8;text-align:center;line-height:48px;font-size:22px;vertical-align:middle;margin-right:10px">${esc(t.emoji || '🎬')}</span>`;
            return h('div', {key:`t${i}`, style:{margin:'20px 0',padding:'16px',background:'#fafafa',borderRadius:'8px',border:'1px solid #eee'}, dangerouslySetInnerHTML: {__html:
              `<div style="display:flex;align-items:center;margin-bottom:8px">${avatar}<h2 style="margin:0;font-size:18px">${esc(t.client)}</h2></div>` +
              `<p style="margin:6px 0;font-size:13px;line-height:1.5"><em>"${esc(t.quote)}"</em></p>` +
              `<p style="margin:4px 0;font-size:12px;color:#666"><strong>Rôle :</strong> ${esc(t.role)} · <strong>Style :</strong> ${esc(t.style)}${t.photo ? ' · 📷 photo' : ' · '+esc(t.emoji||'🎬')+' emoji'}</p>`
            }});
          }),
        ]);
      }
    }));

  </script>
</body>
</html>
